    <style>
        /* Enhanced Process Section Animations */

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.05;
            }

            50% {
                opacity: 0.15;
            }
        }

        @keyframes slideInFromBottom {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeInBlur {
            from {
                filter: blur(10px);
                opacity: 0;
            }

            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        /* Process Step Reveal Enhancements */
        .process-step-reveal {
            animation-fill-mode: both;
        }

        /* Counter animation effect */
        @keyframes countUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Add ripple effect on hover */
        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 0.6;
            }

            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Shine effect */
        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        .process-card-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            pointer-events: none;
        }

        .process-card-shine:hover::after {
            animation: shine 1.5s ease-in-out;
        }

        .brutalist-border {
            border: 4px solid #000000;
        }

        .brutalist-border-sm {
            border: 2px solid #000000;
        }

        .brutalist-shadow {
            box-shadow: 8px 8px 0px 0px #000000;
        }

        .brutalist-shadow-sm {
            box-shadow: 4px 4px 0px 0px #000000;
        }

        .brutalist-shadow-yellow {
            box-shadow: 8px 8px 0px 0px #FFD400;
        }

        .brutalist-shadow-blue {
            box-shadow: 8px 8px 0px 0px #0A46C5;
        }

        ::selection {
            background-color: #FFD400;
            color: #000000;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }

        /* Custom scrollbar for brutalist look */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #FFD400;
            border: 3px solid #000000;
        }


        .magnetic-wrap {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
    </style>

        <style>
            .loader-wrap {
                animation: wrapZoom 2.5s cubic-bezier(0.83, 0, 0.17, 1) forwards;
            }

                filter: drop-shadow(0 0 5px rgba(185, 255, 0, 0.4));
                animation: pulseGlow 2s infinite alternate;
            }

            .water-rise {
                transform: translateY(90px);
                animation: riseUp 2.8s cubic-bezier(0.83, 0, 0.17, 1) forwards;
                filter: drop-shadow(0 -5px 15px rgba(185, 255, 0, 0.8));
            }

            .water-sway {
                animation: sway 1.5s linear infinite;
            }

                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.3em;
                color: #B9FF00;
                opacity: 0;
                animation: pulseStatus 0.8s 0.2s infinite alternate, fadeInStatus 0.3s 0.2s forwards;
            }

            .loader-progress {
                width: 160px;
                height: 1px;
                background: rgba(185, 255, 0, 0.2);
                overflow: hidden;
                opacity: 0;
                animation: fadeInStatus 0.3s 0.2s forwards;
            }

            .progress-bar {
                width: 0%;
                height: 100%;
                background: #B9FF00;
                box-shadow: 0 0 8px #B9FF00;
                animation: loadProgress 2.2s cubic-bezier(0.83, 0, 0.17, 1) forwards;
            }

            @keyframes drawOutline {

                    stroke-dashoffset: 1;
                    opacity: 0;

                    opacity: 1;
                }

                    clip-path: inset(100% 0 0 0);
                }

                    clip-path: inset(0 0 0 0);
                }

                    filter: drop-shadow(0 0 2px rgba(185, 255, 0, 0.2));
                }

                100% {
                    filter: drop-shadow(0 0 8px rgba(185, 255, 0, 0.6));
                }

                }

                }
            }

                }

                }

                }
            }

                    opacity: 0.4;
                }

                to {
                    opacity: 1;
                }
            }

            @keyframes loadProgress {
                0% {
                    width: 0%;
                }

                50% {
                    width: 70%;
                }

                100% {
                    width: 100%;
                }
            }

            @keyframes wrapZoom {

                    transform: scale(0.95);
                }
