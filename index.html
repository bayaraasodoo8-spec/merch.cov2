<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCH.CORP | YOUR STORY. YOUR VISION. YOUR MERCH.</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brand-blue": "#0A46C5",
                        "brand-yellow": "#FFD400",
                        "brand-pink": "#FF5C6D",
                        "deep-black": "#000000",
                        "stark-white": "#FFFFFF",
                    },
                    fontFamily: {
                        "display": ["Syne", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "elegant": ["Playfair Display", "serif"]
                    },
                    animation: {
                        'marquee': 'marquee 100s linear infinite',
                        'marquee-fast': 'marquee 30s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        /* Enhanced Process Section Animations */

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.05;
            }

            50% {
                opacity: 0.15;
            }
        }

        @keyframes slideInFromBottom {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeInBlur {
            from {
                filter: blur(10px);
                opacity: 0;
            }

            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        /* Process Step Reveal Enhancements */
        .process-step-reveal {
            animation-fill-mode: both;
        }

        /* Counter animation effect */
        @keyframes countUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Add ripple effect on hover */
        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 0.6;
            }

            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Shine effect */
        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        .process-card-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            pointer-events: none;
        }

        .process-card-shine:hover::after {
            animation: shine 1.5s ease-in-out;
        }

        .brutalist-border {
            border: 4px solid #000000;
        }

        .brutalist-border-sm {
            border: 2px solid #000000;
        }

        .brutalist-shadow {
            box-shadow: 8px 8px 0px 0px #000000;
        }

        .brutalist-shadow-sm {
            box-shadow: 4px 4px 0px 0px #000000;
        }

        .brutalist-shadow-yellow {
            box-shadow: 8px 8px 0px 0px #FFD400;
        }

        .brutalist-shadow-blue {
            box-shadow: 8px 8px 0px 0px #0A46C5;
        }

        ::selection {
            background-color: #FFD400;
            color: #000000;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }

        /* Custom scrollbar for brutalist look */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #FFD400;
            border: 3px solid #000000;
        }


        .magnetic-wrap {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>

</head>

</html>
